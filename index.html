<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사과 게임 - Apple Number Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <div id="game-header">
            <div class="info-panel">
                <div id="selection-sum" class="info-item">
                    <span class="info-label">선택 합계:</span>
                    <span id="sum-value" class="info-value">0</span>
                </div>
                <div id="score-display" class="info-item">
                    <span class="info-label">점수:</span>
                    <span id="score-value" class="info-value">0</span>
                </div>
                <div id="moves-display" class="info-item">
                    <span class="info-label">이동:</span>
                    <span id="moves-value" class="info-value">0</span>
                </div>
            </div>
            <a href="comic.html" id="comic-link">🐱 치피 만화 보기</a>
        <button id="restart-button">🔄 다시 시작</button>
        </div>
        <div id="game-grid"></div>
    </div>
    <script src="game.js"></script>
</body>
</html>
