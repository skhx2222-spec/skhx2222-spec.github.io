<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>만화그리기</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #fdf6e3;
            color: #333;
            min-height: 100vh;
        }

        header {
            background: #ff7043;
            color: white;
            text-align: center;
            padding: 32px 16px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        header h1 {
            font-size: 2.8rem;
            letter-spacing: 4px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            margin-top: 8px;
            font-size: 1rem;
            opacity: 0.85;
        }

        main {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 16px;
        }

        .series-btn {
            display: block;
            width: 100%;
            max-width: 320px;
            margin: 0 auto 32px;
            padding: 16px 32px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            background: #42a5f5;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(66,165,245,0.4);
            transition: background 0.2s, transform 0.1s;
        }

        .series-btn:hover {
            background: #1e88e5;
            transform: translateY(-2px);
        }

        .series-btn:active {
            transform: translateY(0);
        }

        .series-btn .arrow {
            margin-left: 8px;
            display: inline-block;
            transition: transform 0.3s;
        }

        .series-btn.open .arrow {
            transform: rotate(180deg);
        }

        #cat1-gallery {
            display: none;
            animation: fadeIn 0.35s ease;
        }

        #cat1-gallery.visible {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 8px;
        }

        .comic-panel {
            background: white;
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 4px 4px 0 #333;
        }

        .comic-panel img {
            width: 100%;
            height: auto;
            display: block;
        }

        .comic-panel .caption {
            padding: 10px 14px;
            font-size: 0.9rem;
            font-weight: bold;
            border-top: 2px solid #eee;
            text-align: center;
            background: #fffde7;
        }

        .placeholder {
            width: 100%;
            aspect-ratio: 3/4;
            background: repeating-linear-gradient(
                45deg,
                #f5f5f5,
                #f5f5f5 10px,
                #eeeeee 10px,
                #eeeeee 20px
            );
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #bbb;
        }
    </style>
</head>
<body>

<header>
    <h1>🎨 만화그리기</h1>
    <p>나만의 만화 시리즈 모음</p>
</header>

<main>
    <button class="series-btn" id="cat1-btn" onclick="toggleGallery()">
        🐱 Cat 시리즈 #1 <span class="arrow">▼</span>
    </button>

    <div id="cat1-gallery">
        <div class="gallery-grid" id="gallery-grid">
            <!-- 이미지가 추가되면 자동으로 표시됩니다 -->
        </div>
    </div>
</main>

<script>
    // 이미지 목록: comics/cat1/ 폴더에 이미지를 추가하면 여기에 경로를 넣어주세요.
    // 예: { src: 'comics/cat1/page1.jpg', caption: '1페이지' }
    const cat1Images = [
        // { src: 'comics/cat1/page1.jpg', caption: '1페이지' },
        // { src: 'comics/cat1/page2.jpg', caption: '2페이지' },
    ];

    function buildGallery() {
        const grid = document.getElementById('gallery-grid');
        if (cat1Images.length === 0) {
            grid.innerHTML = '<p style="text-align:center;color:#999;padding:40px 0;font-size:1.1rem;">🖼️ 이미지를 준비 중입니다...</p>';
            return;
        }
        cat1Images.forEach(img => {
            const panel = document.createElement('div');
            panel.className = 'comic-panel';
            panel.innerHTML = `
                <img src="${img.src}" alt="${img.caption}" loading="lazy">
                <div class="caption">${img.caption}</div>
            `;
            grid.appendChild(panel);
        });
    }

    function toggleGallery() {
        const gallery = document.getElementById('cat1-gallery');
        const btn = document.getElementById('cat1-btn');
        const isOpen = gallery.classList.contains('visible');
        if (isOpen) {
            gallery.classList.remove('visible');
            btn.classList.remove('open');
        } else {
            gallery.classList.add('visible');
            btn.classList.add('open');
        }
    }

    buildGallery();
</script>

</body>
</html>
