<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>치피, 어디 있니? - kwang-shik version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            color: white;
            font-size: 1.6rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        a.back-link {
            color: white;
            text-decoration: none;
            font-weight: 600;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        a.back-link:hover {
            background: rgba(255,255,255,0.35);
        }

        .comic-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .comic-container img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
        }

        .comic-caption {
            margin-top: 16px;
            color: #555;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>치피, 어디 있니?</h1>
        <a class="back-link" href="index.html">🎮 게임으로 돌아가기</a>
    </header>
    <div class="comic-container">
        <img
            src="https://github.com/user-attachments/assets/f9751cbf-ae78-4339-9846-34878b7a83b9"
            alt="치피, 어디 있니? - kwang-shik version 만화"
        >
        <p class="comic-caption">치피, kwang-shik version</p>
    </div>
</body>
</html>
