<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111827;
            color: #ffffff;
            padding: 24px;
        }

        .wrap {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        h1 {
            margin-bottom: 16px;
            font-size: 28px;
        }

        img {
            width: 100%;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 12px;
            background: #000000;
        }
    </style>
</head>
<body>
    <main class="wrap">
        <h1>Cartoon</h1>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Uniblab.png/1280px-Uniblab.png" alt="만화 이미지">
    </main>
</body>
</html>
